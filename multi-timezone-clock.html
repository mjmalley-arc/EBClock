<!DOCTYPE html><html><head><meta charset="UTF-8"><style>html,body{margin:0;padding:0;height:100%;background:#0a2d5a;color:#fff;font-family:"Segoe UI",Arial,sans-serif;overflow:hidden}.w{padding:4px 10px}.c{border-left:3px solid #1f8ae0;padding:1px 0 1px 8px;margin:0 0 2px}.l{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:#b9d4ee;line-height:1.1}.r{display:flex;align-items:baseline;gap:6px;line-height:1.1}.t{font-size:1.15rem;font-weight:600;font-variant-numeric:tabular-nums}.d{font-size:.64rem;color:#9ec0dd}</style></head><body><div class="w"><div class="c"><div class="l">Guam</div><div class="r"><span class="t" data-tz="Pacific/Guam">--:--:--</span><span class="d" data-d="Pacific/Guam"></span></div></div><div class="c"><div class="l">Honolulu</div><div class="r"><span class="t" data-tz="Pacific/Honolulu">--:--:--</span><span class="d" data-d="Pacific/Honolulu"></span></div></div><div class="c"><div class="l">Eastern</div><div class="r"><span class="t" data-tz="America/New_York">--:--:--</span><span class="d" data-d="America/New_York"></span></div></div></div><script>function u(){var n=new Date();document.querySelectorAll('[data-tz]').forEach(function(e){e.textContent=new Intl.DateTimeFormat('en-US',{timeZone:e.dataset.tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(n)});document.querySelectorAll('[data-d]').forEach(function(e){e.textContent=new Intl.DateTimeFormat('en-US',{timeZone:e.dataset.d,weekday:'short',month:'short',day:'numeric'}).format(n)})}u();setInterval(u,1000);</script></body></html>
